[build]
  publish = "public"
  command = "echo 'No build step'"
  functions = "netlify/functions"

[dev]
  publish = "public"
  functions = "netlify/functions"
  port = 8888

# ── API routes → Netlify Functions ──────────────────────────────────────────

[[redirects]]
  from = "/admin/login"
  to = "/.netlify/functions/auth"
  status = 200
  force = true

# List all (GET) or create new (POST)
[[redirects]]
  from = "/requests"
  to = "/.netlify/functions/requests"
  status = 200
  force = true

# Public form submit (POST)
[[redirects]]
  from = "/request"
  to = "/.netlify/functions/requests"
  status = 200
  force = true

# Single request by ID: PATCH, DELETE
[[redirects]]
  from = "/request/:id"
  to = "/.netlify/functions/requests?id=:id"
  status = 200
  force = true

# SPA fallback — MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
