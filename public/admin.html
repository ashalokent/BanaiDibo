<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BanaiDibo Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f14;--surface:#13161e;--card:#1a1d27;--border:#252836;
  --accent:#f97316;--accent2:#fb923c;--green:#22c55e;--red:#ef4444;
  --yellow:#eab308;--text:#f1f5f9;--muted:#94a3b8;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-body);font-weight:500;font-size:15px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
.btn-sm{padding:7px 14px;font-size:13px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-pending{background:rgba(234,179,8,.15);color:var(--yellow)}
.tag-accepted{background:rgba(34,197,94,.15);color:var(--green)}
.tag-rejected{background:rgba(239,68,68,.15);color:var(--red)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 5%;background:rgba(13,15,20,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-family:var(--font-head);font-size:20px;font-weight:800;text-decoration:none;color:var(--text);cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-back{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
.nav-back:hover{color:var(--text)}

/* LOGIN */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.login-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:4px}
.login-title span{color:var(--accent)}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--red);margin-bottom:16px}

/* DASHBOARD */
#dashboard{padding-top:64px}
.dash-wrap{max-width:1100px;margin:0 auto;padding:40px 5%}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.dash-title{font-family:var(--font-head);font-size:26px;font-weight:800}
.dash-sub{color:var(--muted);font-size:14px;margin-top:4px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:32px}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px}
.stat-num{font-family:var(--font-head);font-size:28px;font-weight:800}
.stat-lbl{font-size:13px;color:var(--muted);margin-top:4px}

/* FILTER */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:13px;transition:all .2s}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.08)}
.search-input{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;width:220px}
.search-input:focus{border-color:var(--accent)}

/* REQUEST CARDS */
.requests-list{display:flex;flex-direction:column;gap:14px}
.request-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:22px}
.request-card.status-accepted{border-left:4px solid var(--green)}
.request-card.status-rejected{border-left:4px solid var(--red)}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.rc-name{font-family:var(--font-head);font-size:17px;font-weight:700}
.rc-service{font-size:13px;color:var(--accent);font-weight:500;margin-top:2px}
.rc-time{font-size:12px;color:var(--muted);margin-top:3px}
.rc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.rc-field{font-size:13px;color:var(--muted)}
.rc-field strong{color:var(--text);font-weight:500;display:block;margin-bottom:2px}
.rc-issue{font-size:14px;background:rgba(255,255,255,.03);border-radius:8px;padding:10px 14px;color:var(--muted);border:1px solid var(--border);margin-bottom:16px}
.rc-actions{display:flex;gap:8px;flex-wrap:wrap}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .emoji{font-size:48px;margin-bottom:16px}
.loading{text-align:center;padding:40px;color:var(--muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:32px;max-width:480px;width:100%;position:relative;max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface);border:none;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text)}
.detail-row{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.detail-key{font-size:13px;color:var(--muted);width:110px;flex-shrink:0;padding-top:1px}
.detail-val{font-size:14px;color:var(--text);flex:1;word-break:break-word}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

/* TABS */
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 18px;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:500;transition:all .2s;margin-bottom:-1px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}

/* TOAST */
#toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;z-index:999;transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;max-width:320px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Banai<span>Dibo</span></a>
  <a class="nav-back" href="/">← Back to Site</a>
</nav>

<div id="toast"></div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-title">Banai<span>Dibo</span> Admin</div>
    <div class="login-sub">Admin access only. Enter your password to continue.</div>
    <div id="loginError" class="login-error hidden">❌ Incorrect password. Please try again.</div>
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" id="adminPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%" onclick="doLogin()">Log In →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div class="dash-wrap">
    <div class="dash-header">
      <div>
        <div class="dash-title">📋 BanaiDibo Dashboard</div>
        <div class="dash-sub">Manage service requests & professionals</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Log Out</button>
    </div>

    <!-- TAB BAR -->
    <div style="display:flex;gap:8px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0">
      <button class="tab-btn active" id="tab-requests" onclick="switchTab('requests')">📋 Service Requests</button>
      <button class="tab-btn" id="tab-pros" onclick="switchTab('pros')">👷 Professionals <span id="pendingProBadge" class="hidden" style="background:var(--red);color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:4px">0</span></button>
    </div>

    <!-- REQUESTS TAB -->
    <div id="tabRequests">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('accepted',this)">Accepted</button>
        <button class="filter-btn" onclick="setFilter('rejected',this)">Rejected</button>
        <input class="search-input" id="searchInput" placeholder="🔍 Search name, service..." oninput="renderList()"/>
        <button class="btn btn-outline btn-sm" onclick="loadRequests()" style="margin-left:auto">🔄 Refresh</button>
      </div>
      <div class="requests-list" id="requestsList"><div class="loading">Loading…</div></div>
    </div>

    <!-- PROFESSIONALS TAB -->
    <div id="tabPros" class="hidden">
      <div class="stats-grid" id="proStatsGrid"></div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setProFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setProFilter('pending',this)">Pending</button>
        <button class="filter-btn" onclick="setProFilter('approved',this)">Approved</button>
        <button class="filter-btn" onclick="setProFilter('rejected',this)">Rejected</button>
        <input class="search-input" id="proSearchInput" placeholder="🔍 Search name, profession..." oninput="renderPros()"/>
        <button class="btn btn-outline btn-sm" onclick="loadPros()" style="margin-left:auto">🔄 Refresh</button>
      </div>
      <div class="requests-list" id="prosList"><div class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>📋 Request Details</h3>
    <div id="modalContent"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
let allRequests = [];
let currentFilter = 'all';

// ─── Auth ───
async function doLogin(){
  const password = document.getElementById('adminPass').value;
  if(!password){ showToast('Enter your password.','error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  document.getElementById('loginError').classList.add('hidden');

  try {
    const res = await fetch('/.netlify/functions/auth', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password })
    });
    const data = await res.json();

    if(data.success && data.token){
      localStorage.setItem("adminToken", data.token);
      document.getElementById('loginWrap').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadRequests();
    } else {
      throw new Error('Bad credentials');
    }
  } catch {
    document.getElementById('loginError').classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log In →';
  }
}

function doLogout(){
  allRequests = [];
  localStorage.removeItem("adminToken");
  document.getElementById('loginWrap').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('adminPass').value = '';
  document.getElementById('loginError').classList.add('hidden');
}

// ─── Load from server ───
async function loadRequests(){
  document.getElementById('requestsList').innerHTML = '<div class="loading">Loading…</div>';
  const token = localStorage.getItem("adminToken");
  if(!token){ doLogout(); return; }

  try {
    const res = await fetch('/.netlify/functions/requests', {
      headers: { "Authorization": token }
    });
    if(res.status === 403 || res.status === 401){ doLogout(); return; }
    allRequests = await res.json();
    renderStats();
    renderList();
  } catch(e){
    document.getElementById('requestsList').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><div>Failed to load requests. Check your connection.</div></div>';
    showToast('❌ Could not load requests','error');
  }
}

// ─── Stats ───
function renderStats(){
  const total = allRequests.length;
  const pending = allRequests.filter(r=>r.status==='pending').length;
  const accepted = allRequests.filter(r=>r.status==='accepted').length;
  const rejected = allRequests.filter(r=>r.status==='rejected').length;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--text)">${total}</div><div class="stat-lbl">Total Requests</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--yellow)">${pending}</div><div class="stat-lbl">Pending</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${accepted}</div><div class="stat-lbl">Accepted</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${rejected}</div><div class="stat-lbl">Rejected</div></div>
  `;
}

// ─── Filter & Render ───
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  let reqs = [...allRequests];
  if(currentFilter !== 'all') reqs = reqs.filter(r=>r.status===currentFilter);
  if(q) reqs = reqs.filter(r=>(r.name+r.service+r.location+r.phone+r.issue).toLowerCase().includes(q));

  const list = document.getElementById('requestsList');
  if(!reqs.length){
    list.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><div>No requests found</div></div>`;
    return;
  }

  list.innerHTML = reqs.map(r=>`
    <div class="request-card status-${r.status}" id="card-${r.id}">
      <div class="rc-top">
        <div>
          <div class="rc-name">${esc(r.name)}</div>
          <div class="rc-service">${serviceIcon(r.service)} ${esc(r.service)}</div>
          <div class="rc-time">🕐 ${timeAgo(r.createdAt)}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="tag tag-${r.status}">${r.status.charAt(0).toUpperCase()+r.status.slice(1)}</span>
        </div>
      </div>
      <div class="rc-grid">
        <div class="rc-field"><strong>📞 Phone</strong>${esc(r.phone)}</div>
        <div class="rc-field"><strong>📍 Location</strong>${esc(r.location)}</div>
        ${r.whatsapp?`<div class="rc-field"><strong>💬 WhatsApp</strong>${esc(r.whatsapp)}</div>`:''}
        ${r.preferredDate?`<div class="rc-field"><strong>📅 Preferred Date</strong>${esc(r.preferredDate)}</div>`:''}
      </div>
      <div class="rc-issue">📝 ${esc(r.issue)}</div>
      <div class="rc-actions">
        ${r.status!=='accepted'?`<button class="btn btn-success btn-sm" onclick="updateStatus('${r.id}','accepted')">✅ Accept</button>`:''}
        ${r.status!=='rejected'?`<button class="btn btn-danger btn-sm" onclick="updateStatus('${r.id}','rejected')">❌ Reject</button>`:''}
        <button class="btn btn-outline btn-sm" onclick="contactWA('${r.id}')">💬 WhatsApp</button>
        <button class="btn btn-outline btn-sm" onclick="viewDetail('${r.id}')">🔍 Details</button>
        <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="deleteReq('${r.id}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('');
}

// ─── Actions ───
async function updateStatus(id, status){
  const token = localStorage.getItem("adminToken");
  try {
    const res = await fetch(`/.netlify/functions/requests?id=${id}`, {
      method:'PATCH',
      headers:{ 'Content-Type':'application/json', 'Authorization': token },
      body: JSON.stringify({ status })
    });
    if(!res.ok) throw new Error();

    const r = allRequests.find(x=>x.id===id);
    if(r){
      r.status = status;
      let num = (r.whatsapp||r.phone).replace(/\D/g,'');
      if(num.length===10) num='91'+num;
      const msg = status==='accepted'
        ? `Hello ${r.name},\n\nYour ${r.service} request has been ACCEPTED ✅\n\nOur team will contact you shortly.\n\n– BanaiDibo`
        : `Hello ${r.name},\n\nWe're sorry 😔\n\nYour ${r.service} request could not be processed at the moment. Please feel free to try again.\n\n– BanaiDibo`;
      window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
    }
    renderStats();
    renderList();
    showToast(`Request ${status}.`,'success');
  } catch {
    showToast('❌ Failed to update status','error');
  }
}

async function deleteReq(id){
  if(!confirm('Delete this request? This cannot be undone.')) return;
  const token = localStorage.getItem("adminToken");
  try {
    const res = await fetch(`/.netlify/functions/requests?id=${id}`, {
      method:'DELETE',
      headers:{ 'Authorization': token }
    });
    if(!res.ok) throw new Error();
    allRequests = allRequests.filter(r=>r.id!==id);
    renderStats();
    renderList();
    showToast('Request deleted.','success');
  } catch {
    showToast('❌ Failed to delete','error');
  }
}

function contactWA(id){
  const r = allRequests.find(x=>x.id===id);
  if(!r) return;
  let num=(r.whatsapp||r.phone).replace(/\D/g,'');
  if(num.length===10) num='91'+num;
  // Fixed: was "FixMate" — now correctly "BanaiDibo"
  const msg=`Hello ${r.name},\n\nThis is BanaiDibo regarding your ${r.service} request.\n\n📍 Location: ${r.location}\n📝 Issue: ${r.issue}\n\nWe are ready to help you 👍`;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}

function viewDetail(id){
  const r = allRequests.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('modalContent').innerHTML=`
    <div class="detail-row"><div class="detail-key">Request ID</div><div class="detail-val" style="color:var(--accent);font-weight:600;font-size:12px">${r.id}</div></div>
    <div class="detail-row"><div class="detail-key">Name</div><div class="detail-val">${esc(r.name)}</div></div>
    <div class="detail-row"><div class="detail-key">Service</div><div class="detail-val">${serviceIcon(r.service)} ${esc(r.service)}</div></div>
    <div class="detail-row"><div class="detail-key">Phone</div><div class="detail-val"><a href="tel:${esc(r.phone)}" style="color:var(--accent)">${esc(r.phone)}</a></div></div>
    <div class="detail-row"><div class="detail-key">Location</div><div class="detail-val">${esc(r.location)}</div></div>
    ${r.whatsapp?`<div class="detail-row"><div class="detail-key">WhatsApp</div><div class="detail-val">${esc(r.whatsapp)}</div></div>`:''}
    <div class="detail-row"><div class="detail-key">Issue</div><div class="detail-val">${esc(r.issue)}</div></div>
    ${r.preferredDate?`<div class="detail-row"><div class="detail-key">Preferred Date</div><div class="detail-val">${esc(r.preferredDate)}</div></div>`:''}
    <div class="detail-row"><div class="detail-key">Status</div><div class="detail-val"><span class="tag tag-${r.status}">${r.status}</span></div></div>
    <div class="detail-row"><div class="detail-key">Submitted</div><div class="detail-val">${new Date(r.createdAt).toLocaleString('en-IN')}</div></div>
    ${r.updatedAt?`<div class="detail-row"><div class="detail-key">Last Updated</div><div class="detail-val">${new Date(r.updatedAt).toLocaleString('en-IN')}</div></div>`:''}
  `;
  document.getElementById('modalActions').innerHTML=`
    ${r.status!=='accepted'?`<button class="btn btn-success btn-sm" onclick="updateStatus('${r.id}','accepted');closeModal()">✅ Accept</button>`:''}
    ${r.status!=='rejected'?`<button class="btn btn-danger btn-sm" onclick="updateStatus('${r.id}','rejected');closeModal()">❌ Reject</button>`:''}
    <button class="btn btn-primary btn-sm" onclick="contactWA('${r.id}')">💬 WhatsApp</button>
    <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteReq('${r.id}');closeModal()">🗑️ Delete</button>
  `;
  document.getElementById('detailModal').classList.remove('hidden');
}
function closeModal(){ document.getElementById('detailModal').classList.add('hidden'); }

// ─── Helpers ───
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function serviceIcon(s){
  return {'Electrician':'⚡','Plumber':'🔧','House Painting':'🎨','AC Repair':'❄️','Carpenter':'🪑','CCTV Repair':'📷','Mobile Repair':'📱'}[s]||'🔩';
}
function timeAgo(iso){
  if(!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return 'Just now';
  if(m<60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if(h<24) return `${h}h ago`;
  return new Date(iso).toLocaleDateString('en-IN');
}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='show '+(type==='error'?'error':'success');
  setTimeout(()=>{ t.className=''; },3500);
}

// Close modal on overlay click
document.getElementById('detailModal').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

// ─── TAB SWITCHING ───
function switchTab(tab){
  document.getElementById('tabRequests').classList.toggle('hidden', tab!=='requests');
  document.getElementById('tabPros').classList.toggle('hidden', tab!=='pros');
  document.getElementById('tab-requests').classList.toggle('active', tab==='requests');
  document.getElementById('tab-pros').classList.toggle('active', tab==='pros');
  if(tab==='pros') loadPros();
}

// ─── PROFESSIONALS ───
let allPros = [];
let currentProFilter = 'all';

async function loadPros(){
  document.getElementById('prosList').innerHTML = '<div class="loading">Loading…</div>';
  const token = localStorage.getItem("adminToken");
  if(!token){ doLogout(); return; }
  try{
    const res = await fetch('/.netlify/functions/professionals?all=true', {
      headers:{ "Authorization": token }
    });
    if(res.status===403||res.status===401){ doLogout(); return; }
    allPros = await res.json();
    renderProStats();
    renderPros();
  }catch{
    document.getElementById('prosList').innerHTML='<div class="empty-state"><div class="emoji">⚠️</div><div>Failed to load professionals.</div></div>';
  }
}

function renderProStats(){
  const total=allPros.length;
  const pending=allPros.filter(p=>p.status==='pending').length;
  const approved=allPros.filter(p=>p.status==='approved').length;
  const rejected=allPros.filter(p=>p.status==='rejected').length;
  document.getElementById('proStatsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="color:var(--text)">${total}</div><div class="stat-lbl">Total Registered</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--yellow)">${pending}</div><div class="stat-lbl">Awaiting Review</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${approved}</div><div class="stat-lbl">Approved</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${rejected}</div><div class="stat-lbl">Rejected</div></div>
  `;
  // Update badge
  const badge = document.getElementById('pendingProBadge');
  if(pending>0){ badge.textContent=pending; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

function setProFilter(f, btn){
  currentProFilter=f;
  document.querySelectorAll('#tabPros .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPros();
}

function renderPros(){
  const q=(document.getElementById('proSearchInput').value||'').toLowerCase();
  let list=[...allPros];
  if(currentProFilter!=='all') list=list.filter(p=>p.status===currentProFilter);
  if(q) list=list.filter(p=>(p.name+p.profession+p.address+p.phone).toLowerCase().includes(q));

  const el=document.getElementById('prosList');
  if(!list.length){ el.innerHTML='<div class="empty-state"><div class="emoji">📭</div><div>No professionals found.</div></div>'; return; }

  const profIcon=(p)=>({'Electrician':'⚡','Plumber':'🔧','House Painter':'🎨','Carpenter':'🪑','AC Service Expert':'❄️','CCTV Technician':'📷','Mobile Repair Technician':'📱'}[p]||'🔩');

  el.innerHTML = list.map(p=>{
    const avg=p.reviews&&p.reviews.length?(p.reviews.reduce((s,r)=>s+r.rating,0)/p.reviews.length).toFixed(1):null;
    return`<div class="request-card status-${p.status}" id="procard-${p.id}">
      <div class="rc-top">
        <div style="display:flex;gap:14px;align-items:flex-start">
          ${p.photoUrl?`<img src="${p.photoUrl}" style="width:52px;height:62px;border-radius:8px;object-fit:cover;border:2px solid var(--border);flex-shrink:0" alt=""/>`:`<div style="width:52px;height:62px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${profIcon(p.profession)}</div>`}
          <div>
            <div class="rc-name">${esc(p.name)}</div>
            <div class="rc-service">${profIcon(p.profession)} ${esc(p.profession)}</div>
            <div class="rc-time">🕐 ${timeAgo(p.createdAt)}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="tag tag-${p.status}">${p.status.charAt(0).toUpperCase()+p.status.slice(1)}</span>
          ${avg?`<span style="color:#f59e0b;font-size:13px">★ ${avg}</span>`:''}
        </div>
      </div>
      <div class="rc-grid">
        <div class="rc-field"><strong>📞 Phone</strong>${esc(p.phone)}</div>
        <div class="rc-field"><strong>🪪 ID Proof</strong>${esc(p.idProof)}</div>
        <div class="rc-field"><strong>⏳ Experience</strong>${esc(p.experience||'Not specified')}</div>
        <div class="rc-field"><strong>🕐 Availability</strong>${esc(p.readiness||'')}</div>
        <div class="rc-field"><strong>🧰 Own Tools</strong>${esc(p.ownTools)}</div>
        <div class="rc-field"><strong>📅 Submitted</strong>${new Date(p.createdAt).toLocaleDateString('en-IN')}</div>
      </div>
      ${p.address?`<div class="rc-issue">📍 ${esc(p.address)}</div>`:''}
      ${p.bio?`<div class="rc-issue" style="margin-top:8px">💬 ${esc(p.bio)}</div>`:''}
      <div class="rc-actions">
        ${p.status!=='approved'?`<button class="btn btn-success btn-sm" onclick="updateProStatus('${p.id}','approved')">✅ Approve</button>`:''}
        ${p.status!=='rejected'?`<button class="btn btn-danger btn-sm" onclick="updateProStatus('${p.id}','rejected')">❌ Reject</button>`:''}
        <button class="btn btn-outline btn-sm" onclick="viewProDetail('${p.id}')">🔍 Details</button>
        <a href="https://wa.me/91${p.phone}" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none">💬 WhatsApp</a>
        <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="deletePro('${p.id}')">🗑️ Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function updateProStatus(id, status){
  const token=localStorage.getItem("adminToken");
  try{
    const res=await fetch(`/.netlify/functions/professionals?id=${id}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','Authorization':token},
      body:JSON.stringify({status})
    });
    if(!res.ok) throw new Error();
    const p=allPros.find(x=>x.id===id);
    if(p){
      p.status=status;
      // Send WhatsApp notification
      let num=(p.phone||'').replace(/\D/g,'');
      if(num.length===10) num='91'+num;
      const msg=status==='approved'
        ?`Hello ${p.name},\n\n🎉 Congratulations! Your professional registration on *BanaiDibo* has been APPROVED ✅\n\nYour profile is now visible to customers looking for ${p.profession} in your area.\n\n– BanaiDibo Team`
        :`Hello ${p.name},\n\nWe regret to inform you that your registration on *BanaiDibo* could not be approved at this time.\n\nPlease contact us for more details.\n\n– BanaiDibo Team`;
      window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
    }
    renderProStats(); renderPros();
    showToast(`Professional ${status}.`,'success');
  }catch{ showToast('❌ Failed to update','error'); }
}

async function deletePro(id){
  if(!confirm('Delete this professional? Cannot be undone.')) return;
  const token=localStorage.getItem("adminToken");
  try{
    const res=await fetch(`/.netlify/functions/professionals?id=${id}`,{
      method:'DELETE', headers:{'Authorization':token}
    });
    if(!res.ok) throw new Error();
    allPros=allPros.filter(p=>p.id!==id);
    renderProStats(); renderPros();
    showToast('Professional deleted.','success');
  }catch{ showToast('❌ Failed to delete','error'); }
}

function viewProDetail(id){
  const p=allPros.find(x=>x.id===id);
  if(!p) return;
  const avg=p.reviews&&p.reviews.length?(p.reviews.reduce((s,r)=>s+r.rating,0)/p.reviews.length).toFixed(1):null;
  document.getElementById('modalContent').innerHTML=`
    <div class="detail-row"><div class="detail-key">Name</div><div class="detail-val">${esc(p.name)}</div></div>
    <div class="detail-row"><div class="detail-key">Phone</div><div class="detail-val"><a href="tel:${esc(p.phone)}" style="color:var(--accent)">${esc(p.phone)}</a></div></div>
    <div class="detail-row"><div class="detail-key">Profession</div><div class="detail-val">${esc(p.profession)}</div></div>
    <div class="detail-row"><div class="detail-key">Experience</div><div class="detail-val">${esc(p.experience||'Not specified')}</div></div>
    <div class="detail-row"><div class="detail-key">ID Proof</div><div class="detail-val">${esc(p.idProof)}${p.idNumber?` — ${esc(p.idNumber)}`:''}</div></div>
    <div class="detail-row"><div class="detail-key">Address</div><div class="detail-val">${esc(p.address)}</div></div>
    <div class="detail-row"><div class="detail-key">Availability</div><div class="detail-val">${esc(p.readiness||'')}</div></div>
    <div class="detail-row"><div class="detail-key">Own Tools</div><div class="detail-val">${esc(p.ownTools)}</div></div>
    ${p.bio?`<div class="detail-row"><div class="detail-key">Bio</div><div class="detail-val">${esc(p.bio)}</div></div>`:''}
    <div class="detail-row"><div class="detail-key">Rating</div><div class="detail-val">${avg?`★ ${avg}/5 (${p.reviews.length} reviews)`:'No reviews yet'}</div></div>
    <div class="detail-row"><div class="detail-key">Status</div><div class="detail-val"><span class="tag tag-${p.status}">${p.status}</span></div></div>
    <div class="detail-row"><div class="detail-key">Filed On</div><div class="detail-val">${p.filledDate||''}</div></div>
    <div class="detail-row"><div class="detail-key">Submitted</div><div class="detail-val">${new Date(p.createdAt).toLocaleString('en-IN')}</div></div>
    ${p.photoUrl?`<div class="detail-row"><div class="detail-key">Photo</div><div class="detail-val"><img src="${p.photoUrl}" style="width:80px;height:96px;border-radius:8px;object-fit:cover;border:2px solid var(--border)"/></div></div>`:''}
    ${p.signatureUrl?`<div class="detail-row"><div class="detail-key">Signature</div><div class="detail-val"><img src="${p.signatureUrl}" style="max-width:200px;border-radius:8px;border:1px solid var(--border);background:#fff"/></div></div>`:''}
  `;
  document.getElementById('modalActions').innerHTML=`
    ${p.status!=='approved'?`<button class="btn btn-success btn-sm" onclick="updateProStatus('${p.id}','approved');closeModal()">✅ Approve</button>`:''}
    ${p.status!=='rejected'?`<button class="btn btn-danger btn-sm" onclick="updateProStatus('${p.id}','rejected');closeModal()">❌ Reject</button>`:''}
    <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deletePro('${p.id}');closeModal()">🗑️ Delete</button>
  `;
  document.getElementById('detailModal').classList.remove('hidden');
}

// Auto-login if token exists
window.onload = () => {
  const token = localStorage.getItem("adminToken");
  if(token){
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadRequests();
    // Load pros silently for badge count
    fetch('/.netlify/functions/professionals?all=true',{headers:{"Authorization":token}})
      .then(r=>r.json()).then(data=>{ allPros=data; renderProStats(); }).catch(()=>{});
  }
};
</script>
